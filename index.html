<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0e11">
<title>ARMF Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
.hidden{display:none!important;}

:root{
  --bg:#0d0e11; --s1:#13141a; --s2:#1a1c23; --s3:#22252f; --s4:#2a2e3a;
  --line:rgba(255,255,255,0.06); --line-mid:rgba(255,255,255,0.11);
  --t1:#e8eaf0; --t2:#9aa0b4; --t3:#5a6075;
  --amber:#f0a500; --amber-dim:rgba(240,165,0,0.10); --amber-glow:rgba(240,165,0,0.22);
  --green:#22c55e; --green-dim:rgba(34,197,94,0.12);
  --red:#f87171; --red-dim:rgba(248,113,113,0.12);
  --blue:#60a5fa; --blue-dim:rgba(96,165,250,0.10);
  --r:8px; --r-lg:14px;
  --mono:'Space Mono',monospace; --sans:'Syne',sans-serif;
  --header-h:58px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--sans);overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px;}

/* ── Auth ── */
.auth-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.auth-card{background:var(--s2);border:1px solid var(--line-mid);border-radius:var(--r-lg);padding:40px 44px;width:100%;max-width:380px;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.5);}
.auth-logo{width:52px;height:52px;border-radius:13px;background:linear-gradient(135deg,var(--amber),#c08520);display:flex;align-items:center;justify-content:center;font:800 17px var(--mono);color:#1a0f00;margin:0 auto 18px;box-shadow:0 8px 24px var(--amber-glow);}
.auth-title{font:800 22px var(--sans);letter-spacing:-.04em;margin-bottom:4px;}
.auth-sub{font:400 10px var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:24px;}
.auth-input{background:var(--s3);border:1px solid var(--line-mid);border-radius:var(--r);padding:13px 16px;color:var(--t1);font:700 22px var(--mono);letter-spacing:.3em;text-align:center;width:100%;transition:border-color .2s;margin-bottom:12px;}
.auth-input:focus{outline:none;border-color:var(--amber);}
.auth-btn{width:100%;padding:13px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--amber),#c08520);color:#1a0f00;font:700 14px var(--sans);cursor:pointer;transition:filter .15s;letter-spacing:.02em;}
.auth-btn:hover{filter:brightness(1.1);}
.auth-err{margin-top:10px;font:400 11px var(--mono);color:var(--red);}

/* ── App shell ── */
.app{display:flex;flex-direction:column;height:100%;}
.header{background:var(--s1);border-bottom:1px solid var(--line);padding:0 20px;height:var(--header-h);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.header-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--amber),#c08520);display:flex;align-items:center;justify-content:center;font:800 10px var(--mono);color:#1a0f00;flex-shrink:0;}
.header-title{font:800 16px var(--sans);letter-spacing:-.04em;}
.header-sub{font:400 10px var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-top:1px;}
.header-spacer{flex:1;}
.status-pill{font:700 10px var(--mono);padding:3px 9px;border-radius:20px;background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-glow);letter-spacing:.05em;text-transform:uppercase;}
.header-btn{background:var(--s3);border:1px solid var(--line-mid);border-radius:var(--r);padding:6px 12px;color:var(--t2);font:600 11px var(--sans);cursor:pointer;transition:all .12s;}
.header-btn:hover{border-color:var(--t2);color:var(--t1);}
.logout-btn{background:transparent;border:1px solid var(--line);border-radius:var(--r);padding:6px 12px;color:var(--t3);font:600 11px var(--sans);cursor:pointer;transition:all .12s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* ── DB tab toggle ── */
.db-tabs{display:flex;gap:0;padding:10px 16px;border-bottom:1px solid var(--line);background:var(--s1);flex-shrink:0;}
.db-tab{flex:1;max-width:160px;padding:7px 12px;border-radius:var(--r);border:1px solid var(--line-mid);background:transparent;color:var(--t3);font:700 11px var(--mono);cursor:pointer;text-align:center;text-transform:uppercase;letter-spacing:.06em;transition:all .15s;}
.db-tab:first-child{border-radius:var(--r) 0 0 var(--r);border-right:none;}
.db-tab:last-child{border-radius:0 var(--r) var(--r) 0;}
.db-tab.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}

/* ── DB layout ── */
.db-layout{display:grid;grid-template-columns:220px 1fr;flex:1;overflow:hidden;}
.db-sidebar{background:var(--s1);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;}
.db-sidebar-head{padding:10px 12px;border-bottom:1px solid var(--line);flex-shrink:0;}
.db-sidebar-label{font:700 9px var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;justify-content:space-between;}
.db-table-count{font:700 10px var(--mono);color:var(--amber);background:var(--amber-dim);padding:1px 6px;border-radius:10px;}
.db-tables-list{flex:1;overflow-y:auto;padding:6px;}
.db-table-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:background .1s;font:400 11px var(--mono);color:var(--t2);}
.db-table-item:hover{background:var(--s3);}
.db-table-item.active{background:var(--s3);color:var(--amber);}
.db-table-item-icon{color:var(--t3);flex-shrink:0;font-size:10px;}
.db-table-item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.db-table-item-rows{font:700 9px var(--mono);color:var(--t3);background:var(--s4);padding:1px 5px;border-radius:4px;flex-shrink:0;}

/* ── Remote creds panel ── */
.remote-creds{padding:10px 12px;border-bottom:1px solid var(--line);background:var(--s2);flex-shrink:0;display:none;flex-direction:column;gap:6px;}
.remote-creds.show{display:flex;}
.remote-creds-label{font:700 9px var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.1em;}
.cred-input{width:100%;padding:6px 8px;border-radius:6px;border:1px solid var(--line);background:var(--s1);color:var(--t1);font:400 11px var(--mono);outline:none;transition:border-color .2s;}
.cred-input:focus{border-color:var(--amber);}
.cred-input::placeholder{color:var(--t3);}
.connect-btn{width:100%;padding:6px;border-radius:6px;border:1px solid var(--amber);background:var(--amber-dim);color:var(--amber);font:700 10px var(--mono);cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:filter .15s;}
.connect-btn:hover{filter:brightness(1.15);}

/* ── Query area ── */
.db-main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.db-toolbar{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center;flex-shrink:0;background:var(--s1);}
.query-input{flex:1;background:var(--s3);border:1px solid var(--line-mid);border-radius:var(--r);padding:8px 12px;color:var(--t1);font:400 12px var(--mono);outline:none;transition:border-color .2s;}
.query-input:focus{border-color:var(--amber);}
.query-input::placeholder{color:var(--t3);}
.run-btn{background:linear-gradient(135deg,var(--amber),#c08520);border:none;border-radius:var(--r);padding:8px 16px;color:#1a0f00;font:700 12px var(--sans);cursor:pointer;flex-shrink:0;transition:filter .15s;}
.run-btn:hover{filter:brightness(1.1);}
.export-btn{background:transparent;border:1px solid var(--line-mid);border-radius:var(--r);padding:8px 12px;color:var(--t2);font:600 11px var(--sans);cursor:pointer;flex-shrink:0;transition:all .12s;}
.export-btn:hover{border-color:var(--t2);color:var(--t1);}

/* ── Results ── */
.db-results-wrap{flex:1;overflow:auto;position:relative;}
.db-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--t3);}
.db-empty-icon{font-size:28px;opacity:.4;}
.db-empty p{font:400 12px var(--mono);}
.db-error-msg{padding:16px 20px;font:400 12px var(--mono);color:var(--red);background:var(--red-dim);margin:12px;border-radius:var(--r);}
.db-loading{display:flex;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--t3);font:400 12px var(--mono);}
.spinner{width:18px;height:18px;border:2px solid var(--s4);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Results table ── */
.results-table-wrap{overflow:auto;height:100%;}
.results-meta{padding:6px 14px;font:400 10px var(--mono);color:var(--t3);border-bottom:1px solid var(--line);background:var(--s1);flex-shrink:0;display:flex;align-items:center;gap:12px;}
table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono);}
thead th{background:var(--s2);font:700 9px var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0;z-index:1;}
tbody tr{border-bottom:1px solid var(--line);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--s2);}
tbody td{padding:7px 12px;color:var(--t2);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
tbody td.null-val{color:var(--t3);font-style:italic;}

/* ── Pagination ── */
.db-pagination{padding:8px 14px;border-top:1px solid var(--line);background:var(--s1);display:none;align-items:center;gap:8px;flex-shrink:0;}
.page-btn{background:var(--s3);border:1px solid var(--line-mid);border-radius:var(--r);padding:5px 12px;color:var(--t2);font:600 11px var(--sans);cursor:pointer;transition:all .12s;}
.page-btn:hover:not(:disabled){border-color:var(--amber);color:var(--amber);}
.page-btn:disabled{opacity:.4;cursor:default;}
.page-info{font:400 11px var(--mono);color:var(--t3);}
.page-range{font:400 10px var(--mono);color:var(--t3);margin-left:auto;}
</style>
</head>
<body>

<!-- ── Auth ── -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">AR</div>
    <div class="auth-title">ARMF Viewer</div>
    <div class="auth-sub">Database Explorer</div>
    <input class="auth-input" id="auth-pin" type="password" placeholder="• • • • • •"
      maxlength="20" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="auth-btn" onclick="doLogin()">Connect</button>
    <div class="auth-err hidden" id="auth-err"></div>
  </div>
</div>

<!-- ── App ── -->
<div class="app hidden" id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-mark">AR</div>
    <div>
      <div class="header-title">ARMF Viewer</div>
      <div class="header-sub">Database Explorer</div>
    </div>
    <div class="header-spacer"></div>
    <span class="status-pill" id="db-status-pill">Cage Tool DB</span>
    <button class="logout-btn" onclick="doLogout()">Sign out</button>
  </div>

  <!-- DB toggle tabs -->
  <div class="db-tabs">
    <button class="db-tab active" id="tab-cage" onclick="setTarget('cage')">▤ Cage Tool DB</button>
    <button class="db-tab"        id="tab-remote" onclick="setTarget('remote')">⇄ Remote DB</button>
  </div>

  <!-- DB layout -->
  <div class="db-layout">

    <!-- Sidebar -->
    <div class="db-sidebar">
      <!-- Remote creds (shown when remote tab active) -->
      <div class="remote-creds" id="remote-creds">
        <div class="remote-creds-label">Remote Database</div>
        <input class="cred-input" id="cred-account-id" placeholder="Account ID (32-char hex)"
          oninput="saveRemoteCreds()" autocomplete="off">
        <input class="cred-input" id="cred-db-uuid" placeholder="Database UUID"
          oninput="saveRemoteCreds()" autocomplete="off">
        <button class="connect-btn" onclick="loadTables()">⇄ Connect</button>
      </div>

      <div class="db-sidebar-head">
        <div class="db-sidebar-label">
          Tables
          <span class="db-table-count" id="table-count">—</span>
        </div>
      </div>
      <div class="db-tables-list" id="tables-list">
        <div class="db-empty" style="height:100px"><p>—</p></div>
      </div>
    </div>

    <!-- Main -->
    <div class="db-main">
      <div class="db-toolbar">
        <input class="query-input" id="query-input"
          placeholder="SELECT * FROM table_name LIMIT 100"
          onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey))runQuery()">
        <button class="run-btn" onclick="runQuery()">▶ Run</button>
        <button class="export-btn hidden" id="export-btn" onclick="exportCSV()">⬇ CSV</button>
      </div>

      <div class="results-meta hidden" id="results-meta"></div>

      <div class="db-results-wrap" id="results-wrap">
        <div class="db-empty">
          <div class="db-empty-icon">⬡</div>
          <p>Select a table or write a SQL query and press ⌘/Ctrl + Enter.</p>
        </div>
      </div>

      <div class="db-pagination" id="pagination">
        <button class="page-btn" id="prev-btn" onclick="changePage(-1)" disabled>← Prev</button>
        <span class="page-info" id="page-info">Page 1</span>
        <button class="page-btn" id="next-btn" onclick="changePage(1)">Next →</button>
        <span class="page-range" id="page-range"></span>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────
const API_URL  = 'https://armf-viewer.exposurephotographer0.workers.dev';
const LS_PIN   = 'armf_pin';
const PAGE_SIZE = 200;

let _pin    = '';
let _target = 'cage'; // 'cage' | 'remote'
let _data   = [];
let _page   = 0;
let _ms     = 0;

const authHdr = () => _pin ? { 'Authorization': `Bearer ${_pin}` } : {};

// ── Auth ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(LS_PIN);
  if (saved) { _pin = saved; showApp(); }
});

async function doLogin() {
  const pinEl = document.getElementById('auth-pin');
  const errEl = document.getElementById('auth-err');
  const pin   = pinEl.value.trim();
  errEl.classList.add('hidden');
  if (!pin) { showAuthErr('Please enter the PIN'); return; }
  try {
    const res  = await fetch(`${API_URL}/api/auth`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin }),
    });
    const data = await res.json();
    if (data.ok) {
      _pin = pin;
      localStorage.setItem(LS_PIN, pin);
      showApp();
    } else {
      showAuthErr(data.error || 'Incorrect PIN');
    }
  } catch(e) {
    showAuthErr('Could not reach the ARMF Worker — check network');
  }
}

function showAuthErr(msg) {
  const el = document.getElementById('auth-err');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function showApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadRemoteCreds();
  loadTables();
}

function doLogout() {
  localStorage.removeItem(LS_PIN);
  _pin = '';
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
  document.getElementById('auth-pin').value = '';
}

// ── DB target toggle ─────────────────────────────────────────────────
function setTarget(t) {
  _target = t;
  document.getElementById('tab-cage').classList.toggle('active',   t === 'cage');
  document.getElementById('tab-remote').classList.toggle('active', t === 'remote');
  document.getElementById('remote-creds').classList.toggle('show', t === 'remote');
  document.getElementById('db-status-pill').textContent = t === 'cage' ? 'Cage Tool DB' : 'Remote DB';
  clearResults();
  document.getElementById('tables-list').innerHTML = '<div class="db-empty" style="height:80px"><p>—</p></div>';
  document.getElementById('table-count').textContent = '—';
  if (t === 'cage') loadTables();
}

// ── Remote creds ─────────────────────────────────────────────────────
function saveRemoteCreds() {
  localStorage.setItem('armf_remote_account', document.getElementById('cred-account-id').value.trim());
  localStorage.setItem('armf_remote_uuid',    document.getElementById('cred-db-uuid').value.trim());
}
function loadRemoteCreds() {
  const a = localStorage.getItem('armf_remote_account') || '';
  const u = localStorage.getItem('armf_remote_uuid')    || '';
  document.getElementById('cred-account-id').value = a;
  document.getElementById('cred-db-uuid').value    = u;
}
function getRemoteCreds() {
  return {
    accountId: document.getElementById('cred-account-id').value.trim(),
    dbUuid:    document.getElementById('cred-db-uuid').value.trim(),
  };
}

// ── Load tables ───────────────────────────────────────────────────────
async function loadTables() {
  const listEl = document.getElementById('tables-list');
  listEl.innerHTML = '<div class="db-empty" style="height:80px"><div class="spinner" style="margin:auto"></div></div>';

  try {
    let data;
    if (_target === 'remote') {
      const { accountId, dbUuid } = getRemoteCreds();
      if (!accountId || !dbUuid) {
        listEl.innerHTML = '<div style="padding:10px;font:400 11px var(--mono);color:var(--t3)">Enter Account ID and UUID above, then click Connect.</div>';
        return;
      }
      const res = await fetch(`${API_URL}/api/remote-db/tables`, {
        method: 'POST', headers: { ...authHdr(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ accountId, dbUuid }),
      });
      data = await res.json();
    } else {
      const res = await fetch(`${API_URL}/api/cage-db/tables`, { headers: authHdr() });
      data = await res.json();
    }

    if (!data.ok) throw new Error(data.error || 'Failed');
    const tables = data.tables || [];
    document.getElementById('table-count').textContent = tables.length;
    if (!tables.length) {
      listEl.innerHTML = '<div class="db-empty" style="height:80px"><p>No tables found.</p></div>';
      return;
    }
    listEl.innerHTML = tables.map(t => `
      <div class="db-table-item" id="tbl-${CSS.escape(t.name)}" onclick="selectTable('${t.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
        <span class="db-table-item-icon">▤</span>
        <span class="db-table-item-name">${esc(t.name)}</span>
        ${t.rows !== null ? `<span class="db-table-item-rows">${t.rows}</span>` : ''}
      </div>`).join('');
  } catch(e) {
    listEl.innerHTML = `<div style="padding:10px;font:400 11px var(--mono);color:var(--red)">Error: ${esc(e.message)}</div>`;
    document.getElementById('table-count').textContent = '!';
  }
}

function selectTable(name) {
  document.querySelectorAll('.db-table-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('tbl-' + CSS.escape(name));
  if (el) el.classList.add('active');
  document.getElementById('query-input').value = `SELECT * FROM "${name}" LIMIT 500`;
  runQuery();
}

// ── Run query ─────────────────────────────────────────────────────────
async function runQuery() {
  const sql = document.getElementById('query-input').value.trim();
  if (!sql) return;

  showLoading();
  const t0 = performance.now();
  try {
    let data;
    if (_target === 'remote') {
      const { accountId, dbUuid } = getRemoteCreds();
      if (!accountId || !dbUuid) { showError('Enter Account ID and Database UUID in the sidebar first.'); return; }
      const res = await fetch(`${API_URL}/api/remote-db/query`, {
        method: 'POST', headers: { ...authHdr(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ accountId, dbUuid, sql }),
      });
      data = await res.json();
    } else {
      const res = await fetch(`${API_URL}/api/cage-db/query`, {
        method: 'POST', headers: { ...authHdr(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ sql }),
      });
      data = await res.json();
    }
    _ms = Math.round(performance.now() - t0);
    if (!data.ok) { showError(data.error || 'Query failed'); return; }
    _data = data.results || [];
    _page = 0;
    renderResults();
  } catch(e) {
    showError(e.message);
  }
}

// ── Render results ────────────────────────────────────────────────────
function renderResults() {
  const wrap  = document.getElementById('results-wrap');
  const meta  = document.getElementById('results-meta');
  const pgEl  = document.getElementById('pagination');
  const expEl = document.getElementById('export-btn');

  if (!_data.length) {
    wrap.innerHTML = '<div class="db-empty"><div class="db-empty-icon">⬡</div><p>Query returned no rows.</p></div>';
    meta.classList.add('hidden');
    pgEl.style.display = 'none';
    expEl.classList.add('hidden');
    return;
  }

  const totalPages = Math.ceil(_data.length / PAGE_SIZE);
  const start = _page * PAGE_SIZE, end = Math.min(start + PAGE_SIZE, _data.length);
  const rows  = _data.slice(start, end);
  const cols  = Object.keys(_data[0]);

  meta.classList.remove('hidden');
  meta.textContent = `${_data.length} row${_data.length !== 1 ? 's' : ''} · ${cols.length} col${cols.length !== 1 ? 's' : ''} · ${_ms}ms`;

  expEl.classList.remove('hidden');

  wrap.innerHTML = `<div class="results-table-wrap">
    <table>
      <thead><tr>${cols.map(c => `<th title="${esc(c)}">${esc(c)}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(row =>
        `<tr>${cols.map(c => {
          const v = row[c];
          if (v === null || v === undefined) return `<td class="null-val">NULL</td>`;
          const s = String(v);
          return `<td title="${esc(s)}">${esc(s.length > 120 ? s.slice(0,118)+'…' : s)}</td>`;
        }).join('')}</tr>`
      ).join('')}</tbody>
    </table>
  </div>`;

  if (totalPages > 1) {
    pgEl.style.display = 'flex';
    document.getElementById('page-info').textContent = `Page ${_page + 1} of ${totalPages}`;
    document.getElementById('page-range').textContent = `Rows ${start + 1}–${end} of ${_data.length}`;
    document.getElementById('prev-btn').disabled = _page === 0;
    document.getElementById('next-btn').disabled = _page >= totalPages - 1;
  } else {
    pgEl.style.display = 'none';
  }
}

function changePage(delta) {
  const totalPages = Math.ceil(_data.length / PAGE_SIZE);
  _page = Math.max(0, Math.min(_page + delta, totalPages - 1));
  renderResults();
}

// ── Export CSV ────────────────────────────────────────────────────────
function exportCSV() {
  if (!_data.length) return;
  const cols = Object.keys(_data[0]);
  const csvRows = [cols.map(csvCell).join(',')];
  _data.forEach(row => csvRows.push(cols.map(c => csvCell(row[c])).join(',')));
  const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `armf_export_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.csv`;
  a.click();
}
function csvCell(v) {
  if (v === null || v === undefined) return '';
  const s = String(v);
  return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g,'""')}"` : s;
}

// ── UI helpers ────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('results-wrap').innerHTML = '<div class="db-loading"><div class="spinner"></div>Running query…</div>';
  document.getElementById('results-meta').classList.add('hidden');
  document.getElementById('pagination').style.display = 'none';
  document.getElementById('export-btn').classList.add('hidden');
}
function showError(msg) {
  document.getElementById('results-wrap').innerHTML = `<div class="db-error-msg">${esc(msg)}</div>`;
  document.getElementById('results-meta').classList.add('hidden');
  document.getElementById('pagination').style.display = 'none';
  document.getElementById('export-btn').classList.add('hidden');
}
function clearResults() {
  document.getElementById('results-wrap').innerHTML = '<div class="db-empty"><div class="db-empty-icon">⬡</div><p>Select a table or write a SQL query and press ⌘/Ctrl + Enter.</p></div>';
  document.getElementById('results-meta').classList.add('hidden');
  document.getElementById('pagination').style.display = 'none';
  document.getElementById('export-btn').classList.add('hidden');
  _data = []; _page = 0;
}
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
